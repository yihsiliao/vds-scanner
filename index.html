<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>VDS 掃描橋接系統</title>
<script src="https://unpkg.com/html5-qrcode"></script>
<style>
  body { margin:0; padding:0; font-family:sans-serif; background:#111; color:white; user-select: none; -webkit-user-select: none; }
  #reader { width:100%; }
  #status { text-align:center; padding:14px; font-size:15px; font-weight: bold; background: #14442A; border-bottom: 1px solid #333; transition: background 0.2s; }
  #list { max-height:200px; overflow-y:auto; padding:0 12px; margin-top: 10px; }
  .item { background:#222; padding:10px 12px; border-radius:8px; margin-bottom:6px; font-family:monospace; font-size:13px; border-left: 4px solid #8BB11B; display: flex; justify-content: space-between; }
  #closeBtn { display:block; width:calc(100% - 24px); margin:12px; padding:14px; background:#222; color:white; border:1px solid #444; border-radius:10px; font-size:16px; font-weight:bold; }
  #audio-unlock-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 20px; cursor: pointer; }
</style>
</head>
<body>

  <div id="audio-unlock-overlay" onclick="unlockAudio()">
    <div style="font-size: 50px; margin-bottom: 15px;">📢</div>
    <div style="font-size: 18px; font-weight: 900; margin-bottom: 8px;">點擊畫面任意處開始</div>
    <div style="font-size: 13px; color: #999;">解鎖 iPhone LINE / Safari 限制的掃描嗶聲</div>
  </div>

  <div id="status">📷 請將相機對準標籤 QR Code</div>
  <div id="reader"></div>
  <!-- 🌟 新增：手動輸入區塊 -->
  <div style="display: flex; gap: 8px; margin: 12px;">
    <input type="text" id="manualInput" placeholder="QR 模糊？請直接輸入序號" 
           style="flex: 1; padding: 12px; border-radius: 8px; border: none; font-size: 14px; outline: none; text-transform: uppercase;">
    <button onclick="submitManual()" 
            style="padding: 10px 15px; background: #8BB11B; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer;">
      新增
    </button>
  </div>
  <div id="list"></div>
  <button id="closeBtn" onclick="closeScannerWindow()">完成，關閉視窗</button>

  <script>
    let lastCode = null, lastTime = 0;
    const listEl = document.getElementById('list');
    const statusEl = document.getElementById('status');
    
    const localScannedSet = new Set();
    const pendingSet = new Set(); 
    let audioCtx = null;

    function unlockAudio() {
      try {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        osc.connect(audioCtx.destination);
        osc.start(0); osc.stop(0.01);
        document.getElementById('audio-unlock-overlay').style.display = 'none';
        if (navigator.vibrate) navigator.vibrate(40);
      } catch(e) { console.error(e); }
    }

    function playSuccessBeep() {
      if (!audioCtx) return;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain); gain.connect(audioCtx.destination);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(1046.5, audioCtx.currentTime); 
      gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
      osc.start(); osc.stop(audioCtx.currentTime + 0.08);
    }
    
    function playErrorBuzz() {
      if (!audioCtx) return;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain); gain.connect(audioCtx.destination);
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(130, audioCtx.currentTime); 
      gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
      osc.start(); osc.stop(audioCtx.currentTime + 0.25);
    }

    // 🌟 降低 FPS 到 10，減輕手機 CPU 負擔防止發熱當機
    const scanner = new Html5Qrcode("reader");
    scanner.start(
      { facingMode: "environment" },
      { fps: 10, qrbox: 230 }, 
      (decodedText) => {
        const code = String(decodedText).trim().toUpperCase();
        if (!code) return;

        if (localScannedSet.has(code) || pendingSet.has(code)) return;

        const now = Date.now();
        if (code === lastCode && (now - lastTime) < 1200) return;
        lastCode = code; lastTime = now;

        pendingSet.add(code);
        statusEl.style.background = "#f57f17";
        statusEl.innerText = `🔍 正在核對身分...`;

        if (window.opener) {
          window.opener.postMessage({ type: 'VDS_QR_SCAN', code: code }, '*');
        }
      },
      () => {}
    ).catch(err => {
      statusEl.style.background = "#dc3545";
      statusEl.innerText = "⚠️ 無法啟動相機：" + err;
    });

    window.addEventListener('message', (event) => {
      if (!event.data) return;
      const msg = event.data;

      if (msg.clearCode) pendingSet.delete(msg.clearCode);
      else if (msg.code) pendingSet.delete(msg.code);

      if (msg.type === 'VDS_QR_APPROVED') {
        const codesToAdd = msg.unpackedCodes || [msg.code];
        codesToAdd.forEach(cId => {
          if (!localScannedSet.has(cId)) {
            localScannedSet.add(cId);
            const div = document.createElement('div');
            div.className = 'item';
            div.innerHTML = `<span>[#${localScannedSet.size}] ${cId}</span><small style="color:#8BB11B;">${msg.variety || ''}</small>`;
            listEl.prepend(div);
          }
        });
        playSuccessBeep();
        if (navigator.vibrate) navigator.vibrate(60);
        statusEl.style.background = "#14442A";
        statusEl.innerHTML = `📷 已掃描計數：<span style="font-size:20px;color:#8BB11B;">${localScannedSet.size}</span> 罐`;
      } else if (msg.type === 'VDS_QR_REJECTED') {
        playErrorBuzz();
        if (navigator.vibrate) navigator.vibrate([100, 60, 100]);
        statusEl.style.background = "#dc3545";
        statusEl.innerText = msg.reason;
      }
    });

    function submitManual() {
      const inputEl = document.getElementById('manualInput');
      const code = String(inputEl.value).trim().toUpperCase();
      if (!code) return;

      if (localScannedSet.has(code) || pendingSet.has(code)) {
        inputEl.value = ''; 
        return;
      }

      pendingSet.add(code);
      statusEl.style.background = "#f57f17";
      statusEl.innerText = `🔍 正在核對身分...`;

      if (window.opener) {
        window.opener.postMessage({ type: 'VDS_QR_SCAN', code: code }, '*');
      }
      inputEl.value = ''; 
    }

    document.getElementById('manualInput').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') {
        e.preventDefault();
        submitManual();
      }
    });

    // 🌟 2. 核心防當機：安全關閉相機資源函式
    let isClosing = false;
    function closeScannerWindow() {
      if (isClosing) return;
      isClosing = true;
      statusEl.style.background = "#333";
      statusEl.innerText = "🛑 正在安全關閉相機...";
      
      try {
        if (scanner && scanner.isScanning) {
          scanner.stop().then(() => {
            scanner.clear();
            window.close();
          }).catch(() => { window.close(); });
        } else {
          if (scanner) scanner.clear();
          window.close();
        }
      } catch(e) {
        window.close();
      }
    }

    // 🌟 3. 雙重保險：使用者如果直接滑掉視窗，也要嘗試關閉相機
    window.addEventListener('beforeunload', () => {
      if (window.opener) window.opener.postMessage({ type: 'VDS_QR_CLOSED' }, '*');
      try { 
        if (scanner && scanner.isScanning) { scanner.stop(); scanner.clear(); } 
      } catch(e) {}
    });
  </script>
</body>
</html>
