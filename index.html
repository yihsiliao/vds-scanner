<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>VDS 掃描橋接系統</title>
<script src="https://unpkg.com/html5-qrcode"></script>
<style>
  body { margin:0; padding:0; font-family:sans-serif; background:#111; color:white; user-select: none; -webkit-user-select: none; }
  #reader { width:100%; }
  #status { text-align:center; padding:14px; font-size:15px; font-weight: bold; background: #14442A; border-bottom: 1px solid #333; transition: background 0.3s; }
  #list { max-height:200px; overflow-y:auto; padding:0 12px; margin-top: 10px; }
  .item { background:#222; padding:10px 12px; border-radius:8px; margin-bottom:6px; font-family:monospace; font-size:13px; border-left: 4px solid #8BB11B; display: flex; justify-content: space-between; }
  #closeBtn { display:block; width:calc(100% - 24px); margin:12px; padding:14px; background:#222; color:white; border:1px solid #444; border-radius:10px; font-size:16px; font-weight:bold; }
  #audio-unlock-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 20px; cursor: pointer; }
</style>
</head>
<body>

  <div id="audio-unlock-overlay" onclick="unlockAudio()">
    <div style="font-size: 50px; margin-bottom: 15px;">🔊</div>
    <div style="font-size: 18px; font-weight: 900; margin-bottom: 8px;">請點擊畫面任意處</div>
    <div style="font-size: 13px; color: #aaa;">以解鎖 iPhone 相機掃描音效提示</div>
  </div>

  <div id="status">📷 請將相機對準標籤 QR Code</div>
  <div id="reader"></div>
  <div id="list"></div>
  <button id="closeBtn" onclick="window.close()">完成，關閉視窗</button>

  <script>
    let lastCode = null, lastTime = 0;
    const listEl = document.getElementById('list');
    const statusEl = document.getElementById('status');
    
    const localScannedSet = new Set();
    let audioCtx = null;

    // 🌟 iPhone 專用音訊解鎖函式
    function unlockAudio() {
      try {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') {
          audioCtx.resume();
        }
        // 播放一個極短的靜音，促使 iOS 核心放行
        const osc = audioCtx.createOscillator();
        osc.connect(audioCtx.destination);
        osc.start(0); osc.stop(0.01);
        
        // 隱藏解鎖層
        document.getElementById('audio-unlock-overlay').style.display = 'none';
        if (navigator.vibrate) navigator.vibrate(40);
      } catch(e) { console.error(e); }
    }

    // 🔊 瞬發標準「嗶」聲 (成功音效)
    function playSuccessBeep() {
      if (!audioCtx) return;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain); gain.connect(audioCtx.destination);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(988, audioCtx.currentTime); // B5 高音
      gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
      osc.start(); osc.stop(audioCtx.currentTime + 0.08);
    }

    // 🔊 瞬發低沉「嗡」聲 (失敗/重複警告音效)
    function playErrorBuzz() {
      if (!audioCtx) return;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain); gain.connect(audioCtx.destination);
      osc.type = 'sawtooth'; // 鋸齒波，聽起來有刺耳警告感
      osc.frequency.setValueAtTime(150, audioCtx.currentTime); // 低頻
      gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
      osc.start(); osc.stop(audioCtx.currentTime + 0.25); // 聲音拉長
    }

    // 📷 啟動相機
    const scanner = new Html5Qrcode("reader");
    scanner.start(
      { facingMode: "environment" },
      { fps: 10, qrbox: 230 },
      (decodedText) => {
        const code = String(decodedText).trim().toUpperCase();
        if (!code) return;

        const now = Date.now();
        if (code === lastCode && (now - lastTime) < 1500) return; // 提高防抖間隔至 1.5 秒
        lastCode = code; lastTime = now;

        // A. 本地重複防護
        if (localScannedSet.has(code)) {
          triggerLocalError(`⚠️ 本次已掃描過：${code}`);
          return;
        }

        // B. 🌟 進入「審查階段」：不嗶聲、不進清單，立刻秒傳給 GAS 後台核對
        statusEl.style.background = "#f57f17";
        statusEl.innerText = `🔍 雲端驗證中：${code}`;

        if (window.opener) {
          window.opener.postMessage({ type: 'VDS_QR_SCAN', code: code }, '*');
        }
      },
      () => {}
    ).catch(err => {
      statusEl.style.background = "#dc3545";
      statusEl.innerText = "⚠️ 無法啟動相機：" + err;
    });

    // 🌟 監聽大視窗 (GAS) 傳回來的審查結果
    window.addEventListener('message', (event) => {
      if (!event.data) return;
      const msg = event.data;

      if (msg.type === 'VDS_QR_APPROVED') {
        // ✅ 驗證通過！允許匯入
        localScannedSet.add(msg.code);
        playSuccessBeep();
        if (navigator.vibrate) navigator.vibrate(60);

        statusEl.style.background = "#14442A";
        statusEl.innerHTML = `📷 已核對加入：<span style="font-size:20px;color:#8BB11B;">${localScannedSet.size}</span> 罐`;

        const div = document.createElement('div');
        div.className = 'item';
        div.innerHTML = `<span>[#${localScannedSet.size}] ${msg.code}</span><small style="color:#8BB11B;">${msg.variety || ''}</small>`;
        listEl.prepend(div);

      } else if (msg.type === 'VDS_QR_REJECTED') {
        // ❌ 驗證失敗！已被其他地塊使用
        triggerLocalError(`❌ 拒絕匯入：${msg.reason}`);
      }
    });

    function triggerLocalError(errorText) {
      playErrorBuzz();
      if (navigator.vibrate) navigator.vibrate([100, 60, 100]);
      statusEl.style.background = "#dc3545";
      statusEl.innerText = errorText;
    }

    window.addEventListener('beforeunload', () => {
      if (window.opener) window.opener.postMessage({ type: 'VDS_QR_CLOSED' }, '*');
    });
  </script>
</body>
</html>
